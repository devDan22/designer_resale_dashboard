name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never cancel a prod deploy mid-flight

jobs:
  # ── 1. Typecheck (must pass before any deploy) ────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Check backend
        working-directory: backend
        run: npm ci && npx prisma generate && npx tsc --noEmit

      - name: Check frontend
        working-directory: frontend
        run: npm ci && npx tsc --noEmit

  # ── 2. Deploy frontend to S3 + CloudFront ────────────────────────────────
  deploy-frontend:
    name: Frontend → S3/CloudFront
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_PROD }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html must never be cached — it references hashed assets
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_PROD }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_PROD }} \
            --paths "/index.html"

  # ── 3. Deploy backend to EC2 ─────────────────────────────────────────────
  deploy-backend:
    name: Backend → EC2
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          script: |
            set -e

            cd /app/resale-dashboard

            echo "→ Pulling latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "→ Installing backend dependencies"
            cd backend
            npm ci --omit=dev

            echo "→ Generating Prisma client"
            npx prisma generate

            echo "→ Running database migrations"
            npx prisma migrate deploy

            echo "→ Building TypeScript"
            npm run build

            echo "→ Restarting backend"
            pm2 restart resale-backend-prod || \
              pm2 start ecosystem.config.cjs --only resale-backend-prod
            pm2 save

            echo "→ Done. Backend restarted."
