# /etc/nginx/conf.d/resale.conf
# Replace YOUR_DOMAIN with your domain once you have one,
# or leave server_name _ to match any host (works with bare EC2 IP).

server {
    listen 80;
    server_name _;          # ← change to your domain later

    # Allow large photo uploads (matches MAX_PHOTO_SIZE_MB * 10 files)
    client_max_body_size 100M;

    # Pass all traffic to Node.js
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

